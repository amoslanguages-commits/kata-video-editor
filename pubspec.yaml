name: nle_editor
description: Premium offline mobile video editor
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database
  drift: ^2.14.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.1
  path: ^1.8.3

  # Media
  photo_manager: ^3.9.0
  permission_handler: ^12.0.3
  file_picker: ^8.0.0
  video_player: ^2.9.2
  video_thumbnail: ^0.5.5
  audio_waveforms: ^1.2.0

  # Native/media support packages
  ffmpeg_kit_flutter_new: ^4.2.0
  gal: ^2.3.1
  package_info_plus: ^8.3.1
  device_info_plus: ^11.5.0
  shared_preferences: ^2.5.5
  in_app_purchase: ^3.3.0
  share_plus: ^10.0.0
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  drift_dev: ^2.14.0
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/branding/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon_prod.png
  adaptive_icon_background: "#080B12"
  adaptive_icon_foreground: assets/branding/app_icon_prod.png

flutter_native_splash:
  color: "#080B12"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#080B12"
    image: assets/branding/splash_logo.png

