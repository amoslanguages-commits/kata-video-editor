name: Flutter Analyze

on:
  push:
    branches:
      - master
      - fix/media-assets-unification
      - feature/project-media-management
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter analyze
        run: flutter analyze
