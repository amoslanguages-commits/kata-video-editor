name: Release Candidate Gate

on:
  workflow_dispatch:
    inputs:
      build_prod_bundle:
        description: Build production app bundle
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-candidate:
    name: Release candidate validation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Release candidate gate
        run: dart run tool/release_candidate_gate.dart

      - name: Analyze
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test

      - name: Build production app bundle
        if: ${{ github.event.inputs.build_prod_bundle == 'true' }}
        run: flutter build appbundle --release --flavor prod -t lib/main.dart

      - name: Upload production app bundle
        if: ${{ github.event.inputs.build_prod_bundle == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: kata-prod-release-aab
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          if-no-files-found: error
