name: Flutter Android CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: flutter-android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-build:
    name: Analyze, test, and build Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android dev debug
        run: flutter build apk --debug --flavor dev -t lib/main.dart

      - name: Build Android staging debug
        run: flutter build apk --debug --flavor staging -t lib/main.dart

      - name: Upload dev debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kata-dev-debug-apk
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          if-no-files-found: warn

      - name: Upload staging debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kata-staging-debug-apk
          path: build/app/outputs/flutter-apk/app-staging-debug.apk
          if-no-files-found: warn
